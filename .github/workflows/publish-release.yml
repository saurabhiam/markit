# Requires repo secret DRAFT_RELEASE_PAT (PAT with read+write on releases) for listing
# and publishing draft releases. GITHUB_TOKEN does not return drafts from the API.

name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. release-2025-03-10-01)'
        required: true
        type: string

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Check actor is admin
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            if (data.permission !== 'admin') {
              throw new Error(`Only repo admins can run Publish Release. Current permission: ${data.permission}`);
            }

      - name: Validate release tag and draft release exists
        id: validate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DRAFT_RELEASE_PAT }}
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            if (!/^release-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}$/.test(releaseTag)) {
              core.setFailed('Invalid release_tag. Use format release-YYYY-MM-DD-NN (e.g. release-2025-03-10-01).');
              return;
            }
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find(r => r.tag_name === releaseTag);
            if (!release) {
              core.setFailed(`No release found for tag ${releaseTag}. Run Finalize Release first (after merging the release PR).`);
              return;
            }
            if (!release.draft) {
              console.log(`Release ${releaseTag} is already published.`);
            }

      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify @markitjs/core CJS
        run: node -e "require('./packages/core/dist/index.cjs')"

      - name: Verify @markitjs/core ESM
        run: node --input-type=module -e "import './packages/core/dist/index.js'"

      - name: Verify @markitjs/react CJS
        run: node -e "require('./packages/react/dist/index.cjs')"

      - name: Verify @markitjs/react ESM
        run: node --input-type=module -e "import './packages/react/dist/index.js'"

      - name: Install Playwright browsers
        run: cd apps/e2e-bench && bun run playwright:install

      - name: E2E (smoke)
        run: bun run e2e

      - name: Publish to npm
        run: bun run publish-packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create package tarballs
        run: |
          npm pack ./packages/core
          npm pack ./packages/react
          npm pack ./packages/angular
          ls -la *.tgz

      - name: Create source archive
        run: |
          git archive -o "markit-${{ inputs.release_tag }}-source.zip" HEAD
          ls -la *.zip

      - name: Upload assets to GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DRAFT_RELEASE_PAT }}
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const fs = require('fs');
            const path = require('path');
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: releaseTag,
            });
            const files = fs.readdirSync('.').filter(f => f.endsWith('.tgz') || (f.endsWith('.zip') && f.includes('source')));
            for (const file of files) {
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: path.basename(file),
                data,
              });
              console.log('Uploaded ' + file);
            }

      - name: Publish draft GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DRAFT_RELEASE_PAT }}
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: releaseTag,
            });
            if (!release.draft) {
              console.log(`Release ${releaseTag} is already published.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            console.log(`Published release ${releaseTag}`);
