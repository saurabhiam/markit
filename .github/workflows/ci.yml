name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Install Playwright browsers
        run: cd apps/e2e-bench && bun run playwright:install

      - name: E2E (smoke)
        run: bun run e2e

  node-compat:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify CJS import (Node ${{ matrix.node-version }})
        run: node -e "require('./packages/core/dist/index.cjs')"

      - name: Verify ESM import (Node ${{ matrix.node-version }})
        run: node --input-type=module -e "import './packages/core/dist/index.js'"

  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changeset
        run: |
          CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$CHANGESETS" -eq 0 ]; then
            echo "No changeset in this PR (expected). Maintainers add changesets when running Prepare Release."
          else
            echo "Found $CHANGESETS changeset(s)."
          fi
