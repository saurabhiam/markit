# Uses repo secret DRAFT_RELEASE_PAT so draft releases can be found and deleted.

name: Rollback Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to roll back (e.g. release-2025-03-10-01)'
        required: true
        type: string
      confirm_rollback:
        description: 'Set to "true" or the release tag to confirm rollback'
        required: false
        type: string

concurrency:
  group: rollback-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Check actor is admin
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            if (data.permission !== 'admin') {
              throw new Error(`Only repo admins can run Rollback. Current permission: ${data.permission}`);
            }

      - name: Require confirmation
        run: |
          CONFIRM="${{ inputs.confirm_rollback }}"
          TAG="${{ inputs.release_tag }}"
          if [ -z "$CONFIRM" ] || { [ "$CONFIRM" != "true" ] && [ "$CONFIRM" != "$TAG" ]; }; then
            echo "::error::Set confirm_rollback to 'true' or to the release tag ($TAG) to confirm rollback."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package versions at release tag
        id: versions
        run: |
          TAG="${{ inputs.release_tag }}"
          if ! git rev-parse "$TAG" 2>/dev/null; then
            echo "::error::Tag $TAG not found."
            exit 1
          fi
          for pkg in core react angular; do
            git show "${TAG}:packages/${pkg}/package.json" > "/tmp/${pkg}.json" 2>/dev/null || true
            ver=$(node -p "require('/tmp/${pkg}.json').version" 2>/dev/null || echo "")
            echo "${pkg}=${ver}" >> $GITHUB_OUTPUT
          done
          CORE=$(node -p "require('/tmp/core.json').version" 2>/dev/null || echo "")
          REACT=$(node -p "require('/tmp/react.json').version" 2>/dev/null || echo "")
          ANGULAR=$(node -p "require('/tmp/angular.json').version" 2>/dev/null || echo "")
          TAGS=""
          [ -n "$CORE" ] && TAGS="${TAGS}@markitjs/core@${CORE} "
          [ -n "$REACT" ] && TAGS="${TAGS}@markitjs/react@${REACT} "
          [ -n "$ANGULAR" ] && TAGS="${TAGS}@markitjs/angular@${ANGULAR} "
          echo "package_tags=${TAGS% }" >> $GITHUB_OUTPUT

      - name: Delete GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DRAFT_RELEASE_PAT }}
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find(r => r.tag_name === releaseTag);
            if (!release) {
              console.log(`No release found for ${releaseTag}, skipping delete`);
              return;
            }
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
            });
            console.log(`Deleted release for ${releaseTag}`);

      - name: Delete release tag and package tags
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const tags = '${{ steps.versions.outputs.package_tags }}'.trim().split(/\s+/).filter(Boolean);
            for (const tag of [releaseTag, ...tags]) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                });
                console.log(`Deleted tag ${tag}`);
              } catch (err) {
                if (err.status === 404 || err.status === 422) {
                  console.log(`Skipped (tag not found): ${tag}`);
                } else {
                  throw err;
                }
              }
            }

      - name: Unpublish or deprecate on npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Unpublish each package version
        run: |
          CORE="${{ steps.versions.outputs.core }}"
          REACT="${{ steps.versions.outputs.react }}"
          ANGULAR="${{ steps.versions.outputs.angular }}"
          for pkg_ver in "@markitjs/core@${CORE}" "@markitjs/react@${REACT}" "@markitjs/angular@${ANGULAR}"; do
            ver="${pkg_ver#*@}"
            if [ -z "$ver" ] || [ "$ver" = "$pkg_ver" ]; then
              continue
            fi
            if ! npm view "$pkg_ver" version 2>/dev/null; then
              echo "Skipped (not on npm): $pkg_ver"
              continue
            fi
            if npm unpublish "$pkg_ver" --force 2>/dev/null; then
              echo "Unpublished $pkg_ver"
            else
              npm deprecate "$pkg_ver" "Rolled back. Use a different version." || true
              echo "Deprecated $pkg_ver"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Find merge commit for release
        id: revert
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const titlePattern = `chore: release ${releaseTag}`;
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged "${titlePattern}"`,
              sort: 'updated',
              order: 'desc',
              per_page: 5,
            });
            const pr = data.items.find(issue => issue.title === titlePattern);
            if (!pr) {
              core.warning(`No merged PR found with title "${titlePattern}". Skipping revert.`);
              core.setOutput('commit', '');
              return;
            }
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const mergeSha = pull.merge_commit_sha;
            if (!mergeSha) {
              core.warning(`PR #${pr.number} has no merge commit. Skipping revert.`);
              core.setOutput('commit', '');
              return;
            }
            console.log(`Found merge commit ${mergeSha} from PR #${pr.number}`);
            core.setOutput('commit', mergeSha);

      - name: Revert skipped (no release PR found)
        if: steps.revert.outputs.commit == ''
        run: |
          echo "Skipped revert (no merged PR with title 'chore: release ${{ inputs.release_tag }}' found)"

      - name: Create revert branch and push
        if: steps.revert.outputs.commit != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git checkout -b "rollback/${{ inputs.release_tag }}"
          git revert ${{ steps.revert.outputs.commit }} -m 1 --no-edit
          git push origin "rollback/${{ inputs.release_tag }}"

      - name: Create revert PR
        if: steps.revert.outputs.commit != ''
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const branch = `rollback/${releaseTag}`;
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Revert: roll back release ${releaseTag}`,
              head: branch,
              base: 'main',
              body: `This PR reverts the commit that released ${releaseTag}. Created by the Rollback workflow. Please review and merge manually.`,
            });
            console.log(`Created revert PR: ${pr.html_url}`);
