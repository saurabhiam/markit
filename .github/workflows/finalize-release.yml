name: Finalize Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. release-2025-03-10-01)'
        required: true
        type: string

concurrency:
  group: finalize-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is admin
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            if (data.permission !== 'admin') {
              throw new Error(`Only repo admins can run Finalize Release. Current permission: ${data.permission}`);
            }

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate release tag format
        run: |
          TAG="${{ inputs.release_tag }}"
          if ! echo "$TAG" | grep -qE '^release-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::Invalid release_tag. Use format release-YYYY-MM-DD-NN (e.g. release-2025-03-10-01)"
            exit 1
          fi

      - name: Check release tag does not exist
        run: |
          TAG="${{ inputs.release_tag }}"
          if git rev-parse "$TAG" 2>/dev/null; then
            echo "::error::Tag $TAG already exists. Use a different release tag or run Publish if this release was already finalized."
            exit 1
          fi

      - name: Read current package versions
        id: current_versions
        run: |
          CORE=$(node -p "require('./packages/core/package.json').version")
          REACT=$(node -p "require('./packages/react/package.json').version")
          ANGULAR=$(node -p "require('./packages/angular/package.json').version")
          echo "core=$CORE" >> $GITHUB_OUTPUT
          echo "react=$REACT" >> $GITHUB_OUTPUT
          echo "angular=$ANGULAR" >> $GITHUB_OUTPUT

      - name: Get previous release tag and read previous versions
        id: previous_versions
        run: |
          PREV=$(git tag -l 'release-*' --sort=-v:refname | grep -v "${{ inputs.release_tag }}" | head -n1)
          echo "tag=${PREV:-}" >> $GITHUB_OUTPUT
          if [ -z "$PREV" ]; then
            echo "core=0.0.0" >> $GITHUB_OUTPUT
            echo "react=0.0.0" >> $GITHUB_OUTPUT
            echo "angular=0.0.0" >> $GITHUB_OUTPUT
          else
            for pkg in core react angular; do
              git show "${PREV}:packages/${pkg}/package.json" > "/tmp/${pkg}.json" 2>/dev/null || true
              ver=$(node -p "require('/tmp/${pkg}.json').version" 2>/dev/null || echo "0.0.0")
              echo "${pkg}=${ver}" >> $GITHUB_OUTPUT
            done
          fi

      - name: Determine bumped packages and create package tags
        id: package_tags
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          CORE="${{ steps.current_versions.outputs.core }}"
          REACT="${{ steps.current_versions.outputs.react }}"
          ANGULAR="${{ steps.current_versions.outputs.angular }}"
          OLD_CORE="${{ steps.previous_versions.outputs.core }}"
          OLD_REACT="${{ steps.previous_versions.outputs.react }}"
          OLD_ANGULAR="${{ steps.previous_versions.outputs.angular }}"
          TAGS=""
          [ "$CORE" != "$OLD_CORE" ] && TAGS="${TAGS}@markitjs/core@${CORE}"
          [ "$REACT" != "$OLD_REACT" ] && TAGS="${TAGS} @markitjs/react@${REACT}"
          [ "$ANGULAR" != "$OLD_ANGULAR" ] && TAGS="${TAGS} @markitjs/angular@${ANGULAR}"
          TAGS=$(echo "$TAGS" | xargs)
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create and push release tag
        run: |
          git tag "${{ inputs.release_tag }}"
          git push origin "${{ inputs.release_tag }}"

      - name: Create and push package tags (bumped only)
        run: |
          TAGS="${{ steps.package_tags.outputs.tags }}"
          for tag in $TAGS; do
            [ -z "$tag" ] && continue
            git tag "$tag"
            git push origin "$tag"
          done

      - name: Generate release notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ inputs.release_tag }}';
            const prevTag = '${{ steps.previous_versions.outputs.tag }}';
            const params = prevTag
              ? { tag_name: releaseTag, previous_tag_name: prevTag, target_commitish: 'main' }
              : { tag_name: releaseTag, target_commitish: 'main' };
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ...params,
            });
            const fs = require('fs');
            fs.writeFileSync('release-notes-body.md', data.body || '');

      - name: Build release body with package versions
        id: release_body
        run: |
          CORE="${{ steps.current_versions.outputs.core }}"
          REACT="${{ steps.current_versions.outputs.react }}"
          ANGULAR="${{ steps.current_versions.outputs.angular }}"
          {
            echo "## Package versions"
            echo ""
            echo "- @markitjs/core: $CORE"
            echo "- @markitjs/react: $REACT"
            echo "- @markitjs/angular: $ANGULAR"
            echo ""
            echo "---"
            echo ""
            cat release-notes-body.md
          } > release-body-final.md

      - name: Create draft GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseTag = '${{ inputs.release_tag }}';
            const body = fs.readFileSync('release-body-final.md', 'utf8');
            const { data: existing } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: releaseTag,
            }).catch(() => ({ data: null }));
            if (existing) {
              if (existing.draft) {
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: existing.id,
                  body,
                });
                console.log('Updated existing draft release');
              } else {
                console.log('Release already published, skipping');
              }
              return;
            }
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: releaseTag,
              name: `Release ${releaseTag}`,
              body,
              draft: true,
            });
            console.log(`Created draft release for ${releaseTag}`);
