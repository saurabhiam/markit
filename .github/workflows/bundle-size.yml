name: Bundle Size

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Measure bundle sizes
        id: measure
        run: |
          fmt() {
            local bytes=$1
            if [ "$bytes" -ge 1048576 ]; then
              echo "$(echo "scale=2; $bytes/1048576" | bc) MB"
            elif [ "$bytes" -ge 1024 ]; then
              echo "$(echo "scale=2; $bytes/1024" | bc) KB"
            else
              echo "${bytes} B"
            fi
          }

          CORE_RAW=$(wc -c < packages/core/dist/index.js | tr -d ' ')
          CORE_GZ=$(gzip -c packages/core/dist/index.js | wc -c | tr -d ' ')
          REACT_RAW=$(wc -c < packages/react/dist/index.js | tr -d ' ')
          REACT_GZ=$(gzip -c packages/react/dist/index.js | wc -c | tr -d ' ')
          NG_RAW=$(wc -c < packages/angular/dist/fesm2022/markitjs-angular.mjs | tr -d ' ')
          NG_GZ=$(gzip -c packages/angular/dist/fesm2022/markitjs-angular.mjs | wc -c | tr -d ' ')

          CORE_RAW_FMT=$(fmt $CORE_RAW)
          CORE_GZ_FMT=$(fmt $CORE_GZ)
          REACT_RAW_FMT=$(fmt $REACT_RAW)
          REACT_GZ_FMT=$(fmt $REACT_GZ)
          NG_RAW_FMT=$(fmt $NG_RAW)
          NG_GZ_FMT=$(fmt $NG_GZ)

          echo "core_raw=$CORE_RAW_FMT" >> $GITHUB_OUTPUT
          echo "core_gz=$CORE_GZ_FMT" >> $GITHUB_OUTPUT
          echo "react_raw=$REACT_RAW_FMT" >> $GITHUB_OUTPUT
          echo "react_gz=$REACT_GZ_FMT" >> $GITHUB_OUTPUT
          echo "ng_raw=$NG_RAW_FMT" >> $GITHUB_OUTPUT
          echo "ng_gz=$NG_GZ_FMT" >> $GITHUB_OUTPUT

          FAILED=0
          STATUS="✅ All packages within size limits"

          if [ "$CORE_GZ" -gt 15360 ]; then
            echo "::error::@markitjs/core exceeds 15 KB gzipped ($CORE_GZ_FMT > 15 KB limit)"
            STATUS="❌ @markitjs/core exceeds 15 KB gzipped limit ($CORE_GZ_FMT)"
            FAILED=1
          fi

          if [ "$REACT_GZ" -gt 3072 ]; then
            echo "::error::@markitjs/react exceeds 3 KB gzipped ($REACT_GZ_FMT > 3 KB limit)"
            STATUS="❌ @markitjs/react exceeds 3 KB gzipped limit ($REACT_GZ_FMT)"
            FAILED=1
          fi

          if [ "$NG_GZ" -gt 5120 ]; then
            echo "::error::@markitjs/angular exceeds 5 KB gzipped ($NG_GZ_FMT > 5 KB limit)"
            STATUS="❌ @markitjs/angular exceeds 5 KB gzipped limit ($NG_GZ_FMT)"
            FAILED=1
          fi

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

          # Step summary
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Raw | Gzipped | Limit |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`@markitjs/core\` | $CORE_RAW_FMT | **$CORE_GZ_FMT** | 15 KB |" >> $GITHUB_STEP_SUMMARY
          echo "| \`@markitjs/react\` | $REACT_RAW_FMT | **$REACT_GZ_FMT** | 3 KB |" >> $GITHUB_STEP_SUMMARY
          echo "| \`@markitjs/angular\` | $NG_RAW_FMT | **$NG_GZ_FMT** | 5 KB |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$STATUS" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- bundle-size-report -->';
            const status = `${{ steps.measure.outputs.status }}`;

            const body = [
              marker,
              '## 📦 Bundle Size Report',
              '',
              '| Package | Raw | Gzipped | Limit |',
              '|---------|-----|---------|-------|',
              `| \`@markitjs/core\` | ${{ steps.measure.outputs.core_raw }} | **${{ steps.measure.outputs.core_gz }}** | 15 KB |`,
              `| \`@markitjs/react\` | ${{ steps.measure.outputs.react_raw }} | **${{ steps.measure.outputs.react_gz }}** | 3 KB |`,
              `| \`@markitjs/angular\` | ${{ steps.measure.outputs.ng_raw }} | **${{ steps.measure.outputs.ng_gz }}** | 5 KB |`,
              '',
              status,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if over limit
        if: steps.measure.outputs.failed == '1'
        run: exit 1
